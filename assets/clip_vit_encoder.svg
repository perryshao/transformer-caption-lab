<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="610" viewBox="0 0 1180 610">
  <rect width="1180" height="610" fill="#ffffff"/>
  <defs>
    <marker id="a2" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto"><path d="M0,0 L0,8 L10,4 z" fill="#334155"/></marker>
    <marker id="a2-rev" markerWidth="11" markerHeight="11" refX="1" refY="4" orient="auto"><path d="M10,0 L10,8 L0,4 z" fill="#334155"/></marker>
    <style>
      .title{font:700 27px Arial,sans-serif;fill:#0f172a}.sub{font:15px Arial,sans-serif;fill:#475569}
      .h{font:700 17px Arial,sans-serif;fill:#0f172a}.t{font:14px Arial,sans-serif;fill:#334155}.s{font:12px Arial,sans-serif;fill:#64748b}
      .b{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:9}.blue{fill:#eff6ff;stroke:#2563eb;stroke-width:2;rx:9}
      .green{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:9}.amber{fill:#fffbeb;stroke:#d97706;stroke-width:2;rx:9}
      .purple{fill:#faf5ff;stroke:#9333ea;stroke-width:2;rx:9}.gray{fill:#f1f5f9;stroke:#64748b;stroke-width:2;rx:9}
      .arrow{stroke:#334155;stroke-width:2;fill:none;marker-end:url(#a2)}.dash{stroke:#64748b;stroke-width:2;stroke-dasharray:6 5;fill:none}
    </style>
  </defs>
  <text x="38" y="43" class="title">CLIP ViT-B/32 Image Encoder</text>
  <text x="38" y="70" class="sub">Image-text contrastive pretraining; the project freezes the vision encoder and exposes all visual tokens</text>

  <rect x="38" y="128" width="135" height="105" class="b"/>
  <text x="76" y="166" class="h">Image</text><text x="60" y="194" class="t">224 x 224 RGB</text><text x="62" y="216" class="s">CLIP normalize</text>
  <line x1="173" y1="180" x2="222" y2="180" class="arrow"/>

  <rect x="222" y="115" width="165" height="130" class="blue"/>
  <text x="252" y="151" class="h">Patchify 32 x 32</text><text x="259" y="180" class="t">7 x 7 patches</text>
  <text x="250" y="205" class="t">Linear projection</text><text x="260" y="228" class="s">49 patch tokens</text>
  <line x1="387" y1="180" x2="435" y2="180" class="arrow"/>

  <rect x="435" y="115" width="180" height="130" class="gray"/>
  <text x="464" y="151" class="h">Token Sequence</text><text x="462" y="180" class="t">prepend CLS token</text>
  <text x="462" y="205" class="t">add position embedding</text><text x="475" y="228" class="s">[B, 50, 768]</text>
  <line x1="615" y1="180" x2="665" y2="180" class="arrow"/>

  <rect x="665" y="95" width="255" height="170" class="amber"/>
  <text x="708" y="130" class="h">Transformer Encoder x 12</text>
  <rect x="690" y="148" width="195" height="32" fill="#fff" stroke="#d97706" rx="5"/><text x="718" y="169" class="t">Multi-Head Attention</text>
  <rect x="690" y="190" width="195" height="32" fill="#fff" stroke="#d97706" rx="5"/><text x="735" y="211" class="t">MLP / FFN</text>
  <text x="712" y="246" class="s">residual + layer norm</text>
  <line x1="920" y1="180" x2="960" y2="180" class="arrow"/>

  <rect x="960" y="105" width="220" height="150" class="green"/>
  <text x="976" y="141" class="h">last_hidden_state</text><text x="974" y="171" class="t">CLS + 49 patch tokens</text>
  <text x="982" y="198" class="t">visual memory</text><text x="1008" y="225" class="s">[B, 50, 768]</text>

  <!-- 弧形双向虚线：contrastive learning -->
  <path d="M690 377 C750 340 780 300 792 265 L792 255" class="dash" marker-start="url(#a2-rev)" marker-end="url(#a2)"/>
  <text x="800" y="330" class="t">contrastive alignment</text>

  <rect x="435" y="320" width="255" height="115" class="purple"/>
  <text x="486" y="356" class="h">CLIP Text Encoder</text><text x="464" y="385" class="t">paired image captions</text><text x="463" y="411" class="s">used only during CLIP pretraining</text>

  <!-- 底部说明文字 -->
  <text x="38" y="480" class="h">How this project uses it</text>
  <text x="38" y="505" class="t">The text encoder and contrastive loss are not used during caption training.</text>
  <text x="38" y="531" class="t">All 50 image tokens become K,V memory for decoder cross-attention; CLIP parameters remain frozen.</text>
  <text x="38" y="555" class="t">Key difference: unlike torchvision ViT's single global feature, CLIP supplies multiple patch-level tokens to the caption decoder.</text>
</svg>
