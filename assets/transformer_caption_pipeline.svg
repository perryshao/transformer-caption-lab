<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="390" viewBox="0 0 1180 390">
  <rect width="1180" height="390" fill="#ffffff"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:8; }
      .accent { fill:#eef6ff; stroke:#2563eb; stroke-width:2; rx:8; }
      .train { fill:#f7fee7; stroke:#65a30d; stroke-width:2; rx:8; }
      .title { font-family:Arial, sans-serif; font-size:20px; font-weight:700; fill:#0f172a; }
      .text { font-family:Arial, sans-serif; font-size:15px; fill:#334155; }
      .small { font-family:Arial, sans-serif; font-size:13px; fill:#475569; }
      .arrow { stroke:#334155; stroke-width:2; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>
  <text x="42" y="42" class="title">ViT Feature + Student-built Transformer Decoder Captioning</text>
  <rect x="50" y="90" width="150" height="100" class="box"/>
  <text x="82" y="126" class="title">Image</text>
  <text x="76" y="156" class="small">Flickr8k photo</text>
  <line x1="200" y1="140" x2="265" y2="140" class="arrow"/>
  <rect x="265" y="80" width="190" height="120" class="accent"/>
  <text x="300" y="118" class="title">Frozen ViT</text>
  <text x="294" y="150" class="text">pretrained encoder</text>
  <text x="304" y="176" class="small">not trained</text>
  <line x1="455" y1="140" x2="520" y2="140" class="arrow"/>
  <rect x="520" y="90" width="155" height="100" class="box"/>
  <text x="548" y="126" class="title">Projection</text>
  <text x="552" y="156" class="small">image feature to d_model</text>
  <line x1="675" y1="140" x2="760" y2="140" class="arrow"/>
  <rect x="760" y="65" width="250" height="165" class="train"/>
  <text x="798" y="102" class="title">Transformer Decoder</text>
  <text x="792" y="134" class="text">masked self-attention</text>
  <text x="792" y="160" class="text">image cross-attention</text>
  <text x="792" y="186" class="text">feed-forward network</text>
  <text x="792" y="212" class="small">implemented by students</text>
  <line x1="1010" y1="145" x2="1070" y2="145" class="arrow"/>
  <rect x="1070" y="95" width="85" height="100" class="box"/>
  <text x="1088" y="132" class="title">Text</text>
  <text x="1088" y="162" class="small">caption</text>
  <rect x="260" y="260" width="255" height="82" class="box"/>
  <text x="290" y="294" class="title">Caption Prefix Tokens</text>
  <text x="296" y="322" class="small">&lt;BOS&gt; a dog runs ...</text>
  <line x1="515" y1="300" x2="760" y2="188" class="arrow"/>
</svg>
